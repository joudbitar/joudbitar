name: Metrics

on:
  # Refresh once a day, and let me trigger it by hand
  schedule: [{ cron: "0 0 * * *" }]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      # Classic profile card (top of the README)
      - name: Classic metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: joudbitar
          filename: metrics.classic.svg
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: America/New_York

      # Isometric contribution calendar (bottom of the README)
      - name: Isometric calendar
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: joudbitar
          filename: metrics.isocalendar.svg
          base: ""
          config_timezone: America/New_York
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
